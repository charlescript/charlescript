name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *' # Roda automaticamente todos os dias à meia-noite
  workflow_dispatch: # Permite que você force a atualização manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Streak Stats
        uses: denvercoder1/github-readme-streak-stats@v1
        with:
          # SUBSTITUA pelo seu nome de usuário exato do GitHub
          github-user: CharlesRocha-dev 
          # Você pode escolher o tema que mais combina (ex: tokyonight, dark, radical)
          theme: tokyonight 

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: estatísticas atualizadas automaticamente via GitHub Actions" || exit 0
          git push