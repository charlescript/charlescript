name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *' # Atualiza todas as noites automaticamente
  workflow_dispatch: # Permite que você clique para rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Gera o cartão de estatísticas gerais com commits privados incluídos
      - name: Generate Stats Card
        uses: anuraghazra/github-readme-stats@v1.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: charlescript
          output: generated/github-stats.svg
          theme: tokyonight
          show_icons: true
          locale: pt-br
          count_private: true

      # Gera o cartão de linguagens com os seus forks incluídos
      - name: Generate Languages Card
        uses: anuraghazra/github-readme-stats@v1.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: charlescript
          output: generated/github-languages.svg
          theme: tokyonight
          layout: compact
          include_forks: true

      # Commita as novas imagens direto no seu repositório de forma limpa
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/*.svg
          git commit -m "docs: atualizando estatísticas com dados privados de forma segura" || exit 0
          git push origin main