name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Passo 1: Gera o Cartão de Estatísticas Gerais (Lado Esquerdo)
      - name: General GitHub Stats
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: charlescript
          filename: github-stats.svg
          template: classic
          base: header, activity, community, repositories
          config_theme: tokyonight
          config_timezone: America/Sao_Paulo

      # Passo 2: Gera o Gráfico das Linguagens Mais Usadas (Lado Direito)
      - name: Most Used Languages
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: charlescript
          filename: github-languages.svg
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          config_theme: tokyonight
          config_timezone: America/Sao_Paulo